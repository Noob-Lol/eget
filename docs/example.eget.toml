[global]
cache_dir = "~/.cache/eget"
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36"
system = ""
target = "~/.local/bin"
gui_target = "~/Applications"
sys7z_path = ""
chunk_concurrency = 0
batch_concurrency = 0
# SDK install root and default archive extensions by Go OS name.
sdk_target = "~/.local/sdks"
sdk_ext_map = { windows = "zip", linux = "tar.gz", darwin = "tar.gz" }

# 首选全局 HTTP 层代理配置；global.proxy_url 仍作为旧版 fallback 支持。
[http_proxy]
url = ""
exclude = []

# 配置 provider 元数据请求缓存策略
[api_cache]
enable = false # 是否启用
cache_time = 300 # unit: s

# https://github.akams.cn/ 这里可以看到很多代理地址
[ghproxy]
# https://ghfast.top/, https://gh-proxy.com/ ...
host_url = ""
fallbacks = []

[packages]

[packages."chlog"]
name = "chlog"
repo = "gookit/gitw"

[packages."picoclaw"]
name = "picoclaw"
repo = "sipeed/picoclaw"
is_gui = true
file = "*.exe"

[packages."winmerge"]
name = "winmerge"
repo = "sourceforge:winmerge"
source_path = "stable"
system = "windows/amd64"
asset_filters = ["x64", "PerUser", "setup"]
is_gui = true

[packages."forgejo"]
name = "forgejo"
repo = "gitea:codeberg.org/forgejo/forgejo"
system = "linux/amd64"
asset_filters = ["linux", "amd64"]
# extract_all = true
# strip_components = 1

[packages."claude"]
repo = "template:claude"
latest_url = "https://downloads.claude.ai/claude-code-releases/latest"
latest_format = "text"
url_template = "https://downloads.claude.ai/claude-code-releases/{version}/{os}-{arch}{libc}/claude{ext}"
os_map = { windows = "win32", linux = "linux", darwin = "darwin" }
arch_map = { amd64 = "x64", arm64 = "arm64" }
ext_map = { windows = ".exe", linux = "", darwin = "" }
libc_map = { glibc = "", musl = "-musl" }
checksum_url_template = "https://downloads.claude.ai/claude-code-releases/{version}/manifest.json"
checksum_format = "json"
checksum_json_path = "platforms.{os}-{arch}{libc}.checksum"
install_action = "run-asset"
install_args = ["install", "latest"]

# Reusable package template for internal tools with the same release layout.
[pkg_templates.mydev]
latest_url = "http://mydev.lan/tools/{name}/latest.yaml"
latest_format = "yaml"
url_template = "http://mydev.lan/tools/{name}/{name}-{os}-{arch}{ext}"
ext_map = { windows = ".exe", linux = "", darwin = "" }

# SDK download examples. `eget sdk` only downloads and installs SDKs;
# environment activation remains the responsibility of tools like kite xenv.
[sdk.go]
aliases = ["golang"]
target = "gosdk/go{version}"
url_template = "https://mirrors.aliyun.com/golang/go{version}.{os}-{arch}.{ext}"
index_url = "https://mirrors.aliyun.com/golang/"
index_format = "html"
filename_pattern = "go{version}.{os}-{arch}.{ext}"
strip_components = 1
ext_map = { windows = "zip", linux = "tar.gz", darwin = "tar.gz" }

[sdk.node]
aliases = ["nodejs"]
target = "nodejs/node{version}"
url_template = "https://mirrors.aliyun.com/nodejs-release/v{version}/node-v{version}-{os}-{arch}.{ext}"
# https://nodejs.org/dist/
index_url = "https://mirrors.aliyun.com/nodejs-release/"
index_format = "html"
index_path_prefix = "/nodejs-release/"
filename_pattern = "node-v{version}-{os}-{arch}.{ext}"
strip_components = 1
os_map = { windows = "win", linux = "linux", darwin = "darwin" }
arch_map = { amd64 = "x64", arm64 = "arm64", 386 = "x86" }
ext_map = { windows = "zip", linux = "tar.xz", darwin = "tar.gz" }

# python
[sdk.python]
aliases = ["py"]
target = "python/python{version}"
url_template = "https://mirrors.aliyun.com/python/python{version}/python-{version}.tar.xz"
# https://registry.npmmirror.com/binary.html?path=python/
index_url = "https://registry.npmmirror.com/binary.html?path=python/"
index_format = "html"
filename_path_prefix = "/python/"
filename_pattern = "python-{version}.tar.xz"
strip_components = 1
ext_map = { windows = "zip", linux = "tar.gzz", darwin = "tar.gz" }

# jdk
[sdk.jdk]
aliases = ["java"]
target = "jdk/openjdk-{version}"
# mirror1: https://mirrors.huaweicloud.com/openjdk/
index_url = "https://mirrors.huaweicloud.com/openjdk/"
index_format = "html"
url_template = "https://mirrors.huaweicloud.com/openjdk/{version}/openjdk-{version}_{os}-{arch}_bin.{ext}"
filename_pattern = "openjdk-{version}_{os}-{arch}_bin.{ext}"
strip_components = 1
arch_map = { amd64 = "x64", arm64 = "aarch64"}
os_map = { darwin = "macos" }
ext_map = { windows = "zip", linux = "tar.gz", darwin = "tar.gz" }

# Azul Zulu JDK uses a JSON index and can be added with:
# eget sdk config add jdk --mirror zulu
